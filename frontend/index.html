<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HACENE TV - IPTV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        /* --- نفس الأنماط الأساسية مع تعديلات طفيفة --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0e14;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #141a24;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a3344;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-area h1 { font-size: 20px; color: #00d4ff; font-weight: 700; }
        .controls-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 7px 16px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            color: #0a0e14;
        }
        .btn-xtream {
            background: #9b59b6;
            color: #fff;
        }
        .btn-xtream:hover { background: #8e44ad; transform: scale(1.02); }
        .btn-xtream.active {
            background: #00d4ff;
            color: #0a0e14;
        }
        .btn-fav {
            background: #e74c3c;
            color: #fff;
        }
        .btn-fav:hover { background: #c0392b; transform: scale(1.02); }
        .btn-fav.active {
            background: #f39c12;
        }
        .search-box {
            padding: 7px 14px;
            border-radius: 30px;
            border: none;
            background: #1e2636;
            color: #fff;
            width: 160px;
            outline: 2px solid transparent;
            transition: 0.3s;
            font-size: 13px;
        }
        .search-box:focus { outline-color: #00d4ff; background: #141a24; }
        .badge-count {
            background: #00d4ff;
            color: #0a0e14;
            padding: 3px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
        }
        .channel-counter { color: #888; font-size: 13px; }
        .app-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        .sidebar {
            width: 220px;
            background: #11161f;
            overflow-y: auto;
            padding: 10px 0;
            border-left: 1px solid #1e2636;
            flex-shrink: 0;
        }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #2a3344; border-radius: 10px; }
        .sidebar .cat-item {
            padding: 8px 16px;
            cursor: pointer;
            transition: 0.2s;
            border-right: 3px solid transparent;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .sidebar .cat-item:hover { background: #1e2636; }
        .sidebar .cat-item.active {
            background: #1e2636;
            border-right-color: #00d4ff;
            color: #00d4ff;
        }
        .sidebar .cat-item .count {
            background: #1e2636;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #888;
        }
        .sidebar .cat-item.active .count { background: #00d4ff22; color: #00d4ff; }
        .main-content {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            background: #0c1017;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 350px;
            text-align: center;
            color: #666;
        }
        .empty-state i { font-size: 60px; color: #00d4ff; margin-bottom: 15px; }
        .empty-state h2 { font-size: 22px; margin-bottom: 8px; color: #ccc; }
        .empty-state p { max-width: 400px; line-height: 1.8; font-size: 14px; }
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 14px;
            margin-top: 8px;
        }
        .channel-card {
            background: #141a24;
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #1e2636;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }
        .channel-card:hover {
            border-color: #00d4ff66;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 212, 255, 0.05);
        }
        .channel-card .ch-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
        }
        .channel-card .ch-name i { color: #00d4ff; font-size: 14px; flex-shrink: 0; }
        .channel-card .ch-icon {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            object-fit: cover;
            background: #1e2636;
            flex-shrink: 0;
        }
        .channel-card .ch-cat {
            font-size: 11px;
            background: #1e2636;
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
            width: fit-content;
            color: #aaa;
        }
        .channel-card .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .channel-card .btn-play {
            flex: 1;
            background: #00d4ff;
            color: #0a0e14;
            border: none;
            padding: 6px 0;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .channel-card .btn-play:hover { background: #00b8e6; }
        .channel-card .btn-fav-card {
            background: #e74c3c33;
            color: #ff8888;
            border: 1px solid #e74c3c44;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 12px;
        }
        .channel-card .btn-fav-card.active {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
        }
        .channel-card .btn-fav-card:hover { background: #e74c3c66; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #141a24;
            border-radius: 20px;
            padding: 25px;
            width: 94%;
            max-width: 480px;
            border: 1px solid #2a3344;
            position: relative;
        }
        .modal-box .close-modal {
            position: absolute;
            top: 10px;
            right: 16px;
            background: none;
            border: none;
            color: #888;
            font-size: 26px;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-box .close-modal:hover { color: #fff; transform: rotate(90deg); }
        .modal-box h2 { color: #fff; margin-bottom: 16px; font-size: 22px; }
        .modal-box label { display: block; margin: 10px 0 4px 0; color: #aaa; font-size: 13px; }
        .modal-box input, .modal-box textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #2a3344;
            background: #1e2636;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .modal-box input:focus, .modal-box textarea:focus { border-color: #00d4ff; }
        .modal-box .btn-save {
            width: 100%;
            margin-top: 16px;
            background: #00d4ff;
            color: #0a0e14;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-box .btn-save:hover { background: #00b8e6; }
        .modal-box .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .modal-box .btn-danger:hover { background: #c0392b; }
        .modal-box .xtream-status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            background: #1e2636;
            color: #aaa;
            font-size: 13px;
            text-align: center;
        }
        .modal-box .xtream-status.success { color: #2ecc71; border: 1px solid #2ecc71; }
        .modal-box .xtream-status.error { color: #e74c3c; border: 1px solid #e74c3c; }
        .export-box textarea {
            width: 100%;
            height: 250px;
            background: #0a0e14;
            color: #00ff88;
            border: 1px solid #2a3344;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            direction: ltr;
            text-align: left;
        }
        .export-box .copy-export-btn {
            margin-top: 10px;
            background: #28a745;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }
        .export-box .copy-export-btn:hover { background: #218838; }
        .export-box .note {
            color: #ffc107;
            font-size: 13px;
            margin-top: 8px;
        }
        /* تحسين العرض على الهاتف */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; height: auto; }
            .sidebar {
                width: 100%;
                max-height: 120px;
                display: flex;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding: 6px 10px;
                border-left: none;
                border-bottom: 1px solid #1e2636;
            }
            .sidebar .cat-item {
                white-space: nowrap;
                border-right: none;
                border-bottom: 3px solid transparent;
                padding: 5px 12px;
                font-size: 13px;
            }
            .sidebar .cat-item.active { border-bottom-color: #00d4ff; }
            .sidebar .cat-item .count { display: none; }
            .header { flex-direction: column; align-items: stretch; }
            .controls-area { justify-content: center; gap: 6px; }
            .search-box { width: 100%; }
            .channels-grid { 
                grid-template-columns: 1fr; /* عمود واحد على الهاتف */
            }
            .modal-box { padding: 18px; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0c1017; }
        ::-webkit-scrollbar-thumb { background: #2a3344; border-radius: 10px; }
        /* إخفاء أزرار الإدارة */
        .admin-only { display: none !important; } /* سيتم عرضها فقط للمدير */
        /* تحسين زر المفضلة */
        .fav-count {
            background: #e74c3c;
            color: #fff;
            border-radius: 50%;
            padding: 0 8px;
            font-size: 12px;
            margin-right: 4px;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="logo-area">
            <h1><i class="fas fa-satellite-dish" style="color:#00d4ff;"></i> HACENE TV</h1>
        </div>
        <div class="controls-area">
            <span class="badge-count"><i class="fas fa-play"></i> مباشر</span>
            <button class="btn btn-xtream" id="xtreamBtn" onclick="openXtreamModal()">
                <i class="fas fa-key"></i> Xtream
            </button>
            <button class="btn btn-fav" id="favBtn" onclick="toggleFavorites()">
                <i class="fas fa-star"></i> <span id="favCount">0</span>
            </button>
            <!-- أزرار الإدارة (مخفية) -->
            <button class="btn btn-add admin-only" onclick="openAddModal()"><i class="fas fa-plus"></i> إضافة</button>
            <button class="btn btn-export admin-only" onclick="exportChannels()"><i class="fas fa-file-export"></i> تصدير</button>
            <button class="btn btn-import admin-only" onclick="importChannels()"><i class="fas fa-file-import"></i> استيراد</button>
            <button class="btn btn-clear admin-only" onclick="clearAllChannels()"><i class="fas fa-trash"></i></button>
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 بحث..." oninput="applyFilters()" />
            <span class="channel-counter" id="channelCount">0</span>
        </div>
    </header>

    <!-- ===== APP CONTAINER ===== -->
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content" id="mainContent">
            <div id="channelsContainer"></div>
        </main>
    </div>

    <!-- ===== MODAL: Xtream Settings (نفسه) ===== -->
    <div class="modal-overlay" id="xtreamModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeXtreamModal()">✕</button>
            <h2><i class="fas fa-key" style="color:#9b59b6;"></i> إعدادات Xtream</h2>
            <label>رابط الخادم (Server URL)</label>
            <input type="url" id="xtreamServer" placeholder="http://example.com:8080" />
            <label>اسم المستخدم (Username)</label>
            <input type="text" id="xtreamUsername" placeholder="أدخل اسم المستخدم" />
            <label>كلمة المرور (Password)</label>
            <input type="password" id="xtreamPassword" placeholder="أدخل كلمة المرور" />
            <button class="btn-save" onclick="saveXtreamSettings()"><i class="fas fa-save"></i> حفظ وجلب القنوات</button>
            <button class="btn-save btn-danger" onclick="clearXtreamSettings()" style="margin-top:8px; background:#e74c3c;">
                <i class="fas fa-trash"></i> إلغاء الربط
            </button>
            <div id="xtreamStatus" class="xtream-status"></div>
        </div>
    </div>

    <!-- ===== MODAL: إضافة قناة يدوي (للمدير فقط) ===== -->
    <div class="modal-overlay admin-only" id="addModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeAddModal()">✕</button>
            <h2><i class="fas fa-plus-circle" style="color:#00d4ff;"></i> إضافة قناة</h2>
            <label>اسم القناة *</label>
            <input type="text" id="inputName" placeholder="مثال: beIN Sports 1" />
            <label>التصنيف</label>
            <input type="text" id="inputCategory" placeholder="مثال: رياضة" />
            <label>رابط المشاهدة (.m3u8) *</label>
            <input type="url" id="inputUrl" placeholder="http://example.com/stream.m3u8" />
            <button class="btn-save" onclick="saveChannel()"><i class="fas fa-save"></i> حفظ</button>
        </div>
    </div>

    <!-- ===== MODAL: تصدير القنوات (للمدير فقط) ===== -->
    <div class="modal-overlay admin-only" id="exportModal">
        <div class="modal-box export-box">
            <button class="close-modal" onclick="closeExportModal()">✕</button>
            <h2><i class="fas fa-file-export" style="color:#28a745;"></i> تصدير القنوات</h2>
            <p style="color:#aaa; font-size:14px; margin-bottom:10px;">
                انسخ هذا الكود، ثم افتح ملف <strong>index.html</strong> في محرر النصوص، 
                وابحث عن <code style="background:#1e2636; padding:2px 8px; border-radius:4px; color:#00d4ff;">// ===== ضع القنوات المصدرة هنا =====</code> 
                وألصق الكود مكان القائمة القديمة.
            </p>
            <textarea id="exportTextarea" readonly></textarea>
            <button class="copy-export-btn" onclick="copyExportCode()"><i class="fas fa-copy"></i> نسخ الكود</button>
            <div class="note"><i class="fas fa-info-circle"></i> بعد اللصق، احفظ الملف وأعد رفعه على GitHub/Vercel.</div>
        </div>
    </div>

    <!-- ===== MODAL: استيراد القنوات (للمدير فقط) ===== -->
    <div class="modal-overlay admin-only" id="importModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeImportModal()">✕</button>
            <h2><i class="fas fa-file-import" style="color:#ffc107;"></i> استيراد القنوات</h2>
            <label>الصق كود القنوات المصدر من الملف القديم:</label>
            <textarea id="importTextarea" style="width:100%; height:200px; background:#0a0e14; color:#00ff88; border:1px solid #2a3344; border-radius:8px; padding:10px; font-family:monospace; font-size:13px; direction:ltr;"></textarea>
            <button class="btn-save" onclick="doImport()" style="margin-top:10px;"><i class="fas fa-upload"></i> استيراد</button>
        </div>
    </div>

    <!-- ===== VIDEO PLAYER (تم إزالة مشغل الفيديو الداخلي، سيتم استخدام الرابط مباشرة) ===== -->
    <!-- لن نحتاج إلى مشغل الفيديو لأننا سنفتح الرابط في نفس النافذة -->

    <!-- ===================================================================== -->
    <!-- =====  JAVASCRIPT ===== -->
    <!-- ===================================================================== -->
    <script>
        // ================================================================
        // 🔴🔴🔴  بيانات القنوات الافتراضية (ضعها هنا)  🔴🔴🔴
        // ================================================================
        let DEFAULT_CHANNELS = [
            // ... (ضع مصفوفة القنوات هنا)
            // لتوفير المساحة، اتركها فارغة أو ضع بياناتك
        ];

        // ================================================================
        // 1.  إدارة التخزين المحلي
        // ================================================================
        const STORAGE_KEY = 'my_iptv_channels';
        const XTREAM_KEY = 'xtream_credentials';
        const FAVORITES_KEY = 'my_favorites';

        // ================================================================
        // 2.  المتغيرات العامة
        // ================================================================
        let allChannels = [];
        let currentCategory = 'الكل';
        let xtreamCredentials = null;
        let isXtreamMode = false;
        let appInitialized = false;
        let favorites = []; // قائمة بالمفضلة (تخزين معرفات القنوات أو أسمائها)
        let showFavoritesOnly = false;
        const isAdmin = false; // ⚠️ اجعلها true لعرض أزرار الإدارة

        // ================================================================
        // 3.  دوال العرض
        // ================================================================

        function buildSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (!allChannels || allChannels.length === 0) {
                sidebar.innerHTML = `<div class="cat-item" style="color:#666; text-align:center;">لا توجد قنوات</div>`;
                return;
            }
            const cats = new Set(allChannels.map(ch => ch.category || 'عام'));
            const sorted = ['الكل', ...Array.from(cats).sort()];

            sidebar.innerHTML = sorted.map(cat => {
                const count = cat === 'الكل' ? allChannels.length : allChannels.filter(ch => (ch.category || 'عام') === cat)
                    .length;
                const active = cat === currentCategory ? 'active' : '';
                return `<div class="cat-item ${active}" data-cat="${cat}" onclick="selectCategory('${cat}')">
                            <span>${cat}</span>
                            <span class="count">${count}</span>
                        </div>`;
            }).join('');
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            let filtered = allChannels;

            // تصفية حسب المفضلة
            if (showFavoritesOnly) {
                filtered = filtered.filter(ch => favorites.includes(ch.id || ch.name));
            }

            if (currentCategory !== 'الكل') {
                filtered = filtered.filter(ch => (ch.category || 'عام') === currentCategory);
            }
            if (search) {
                filtered = filtered.filter(ch => ch.name.toLowerCase().includes(search));
            }
            renderGrid(filtered);
            document.getElementById('channelCount').textContent = filtered.length;
            // تحديث عداد المفضلة
            document.getElementById('favCount').textContent = favorites.length;
        }

        function renderGrid(channels) {
            const container = document.getElementById('channelsContainer');

            if (!channels || channels.length === 0) {
                container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-tv"></i>
                                <h2>لا توجد قنوات</h2>
                                <p>قم بإعداد حساب Xtream بالضغط على زر <strong>"Xtream"</strong>.</p>
                            </div>
                        `;
                return;
            }

            container.innerHTML = `
                        <div class="channels-grid">
                            ${channels.map((ch, index) => {
                                const realIndex = allChannels.indexOf(ch);
                                const iconHtml = ch.icon ? `<img class="ch-icon" src="${ch.icon}" alt="" onerror="this.style.display='none'" />` : '';
                                const isFav = favorites.includes(ch.id || ch.name);
                                return `
                                <div class="channel-card">
                                    <div class="ch-name">
                                        ${iconHtml}
                                        <i class="fas fa-broadcast-tower"></i> ${ch.name || 'بدون اسم'}
                                    </div>
                                    <span class="ch-cat">${ch.category || 'عام'}</span>
                                    <div class="card-actions">
                                        <a href="#" class="btn-play" onclick="playChannelDirect(${realIndex}); return false;">
                                            <i class="fas fa-play"></i> تشغيل
                                        </a>
                                        <button class="btn-fav-card ${isFav ? 'active' : ''}" onclick="toggleFavorite(${realIndex})">
                                            <i class="fas fa-heart"></i>
                                        </button>
                                        ${isAdmin ? `<button class="btn-delete admin-only" onclick="deleteChannel(${realIndex})" title="حذف"><i class="fas fa-trash"></i></button>` : ''}
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    `;
        }

        // ================================================================
        // 4.  دوال التحكم
        // ================================================================

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.sidebar .cat-item').forEach(el => {
                el.classList.toggle('active', el.dataset.cat === cat);
            });
            applyFilters();
        }

        function deleteChannel(index) {
            if (!confirm('هل أنت متأكد من حذف هذه القناة؟')) return;
            allChannels.splice(index, 1);
            saveChannelsToStorage(allChannels);
            buildSidebar();
            applyFilters();
        }

        function clearAllChannels() {
            if (allChannels.length === 0) return;
            if (!confirm('⚠️ هل أنت متأكد من حذف جميع القنوات؟')) return;
            allChannels = [];
            saveChannelsToStorage(allChannels);
            buildSidebar();
            applyFilters();
        }

        // ================================================================
        // 5.  نظام المفضلة
        // ================================================================

        function loadFavorites() {
            try {
                const stored = localStorage.getItem(FAVORITES_KEY);
                if (stored) {
                    favorites = JSON.parse(stored);
                    if (!Array.isArray(favorites)) favorites = [];
                }
            } catch (e) { favorites = []; }
            document.getElementById('favCount').textContent = favorites.length;
        }

        function saveFavorites() {
            localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
            document.getElementById('favCount').textContent = favorites.length;
        }

        function toggleFavorite(index) {
            const channel = allChannels[index];
            if (!channel) return;
            const id = channel.id || channel.name;
            const idx = favorites.indexOf(id);
            if (idx > -1) {
                favorites.splice(idx, 1);
            } else {
                favorites.push(id);
            }
            saveFavorites();
            applyFilters(); // إعادة الرسم لتحديث الأزرار
        }

        function toggleFavorites() {
            showFavoritesOnly = !showFavoritesOnly;
            document.getElementById('favBtn').classList.toggle('active', showFavoritesOnly);
            applyFilters();
        }

        // ================================================================
        // 6.  تشغيل القناة مباشرة في نفس النافذة
        // ================================================================

        function playChannelDirect(index) {
            const channel = allChannels[index];
            if (!channel) {
                alert('⚠️ القناة غير موجودة.');
                return;
            }

            let url = channel.url;
            if (channel.stream_id && isXtreamMode && xtreamCredentials) {
                const { server, username, password } = xtreamCredentials;
                url = `${server}/live/${encodeURIComponent(username)}/${encodeURIComponent(password)}/${channel.stream_id}.m3u8`;
            }

            if (!url || url === '#') {
                alert('⚠️ هذا الرابط غير صحيح.');
                return;
            }

            // فتح الرابط في نفس النافذة
            window.location.href = url;
        }

        // ================================================================
        // 7.  دوال إضافة قناة يدوي (للمدير)
        // ================================================================

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('inputName').focus();
            document.getElementById('inputName').value = '';
            document.getElementById('inputCategory').value = '';
            document.getElementById('inputUrl').value = '';
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        function saveChannel() {
            const name = document.getElementById('inputName').value.trim();
            const category = document.getElementById('inputCategory').value.trim() || 'عام';
            const url = document.getElementById('inputUrl').value.trim();

            if (!name) { alert('⚠️ يرجى إدخال اسم القناة.'); return; }
            if (!url) { alert('⚠️ يرجى لصق رابط القناة.'); return; }

            allChannels.push({ name, category, url, stream_id: null });
            saveChannelsToStorage(allChannels);
            closeAddModal();
            buildSidebar();
            applyFilters();
        }

        // ================================================================
        // 8.  دوال Xtream (مع الحفظ الدائم)
        // ================================================================

        function loadXtreamCredentials() {
            try {
                const stored = localStorage.getItem(XTREAM_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (parsed && parsed.server && parsed.username && parsed.password) {
                        xtreamCredentials = parsed;
                        isXtreamMode = true;
                        document.getElementById('xtreamBtn').classList.add('active');
                        document.getElementById('xtreamBtn').innerHTML = '<i class="fas fa-check"></i> Xtream';
                        return true;
                    }
                }
            } catch (e) {}
            xtreamCredentials = null;
            isXtreamMode = false;
            document.getElementById('xtreamBtn').classList.remove('active');
            document.getElementById('xtreamBtn').innerHTML = '<i class="fas fa-key"></i> Xtream';
            return false;
        }

        function saveXtreamCredentials(creds) {
            try {
                localStorage.setItem(XTREAM_KEY, JSON.stringify(creds));
                xtreamCredentials = creds;
                isXtreamMode = true;
                document.getElementById('xtreamBtn').classList.add('active');
                document.getElementById('xtreamBtn').innerHTML = '<i class="fas fa-check"></i> Xtream';
                return true;
            } catch (e) { return false; }
        }

        function saveChannelsToStorage(channels) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(channels));
        }

        function openXtreamModal() {
            const modal = document.getElementById('xtreamModal');
            modal.classList.add('active');
            if (xtreamCredentials) {
                document.getElementById('xtreamServer').value = xtreamCredentials.server || '';
                document.getElementById('xtreamUsername').value = xtreamCredentials.username || '';
                document.getElementById('xtreamPassword').value = xtreamCredentials.password || '';
            } else {
                document.getElementById('xtreamServer').value = '';
                document.getElementById('xtreamUsername').value = '';
                document.getElementById('xtreamPassword').value = '';
            }
            document.getElementById('xtreamStatus').textContent = '';
            document.getElementById('xtreamStatus').className = 'xtream-status';
        }

        function closeXtreamModal() {
            document.getElementById('xtreamModal').classList.remove('active');
        }

        async function saveXtreamSettings() {
            const server = document.getElementById('xtreamServer').value.trim();
            const username = document.getElementById('xtreamUsername').value.trim();
            const password = document.getElementById('xtreamPassword').value.trim();

            if (!server || !username || !password) {
                showXtreamStatus('يرجى ملء جميع الحقول.', 'error');
                return;
            }

            const baseUrl = server.replace(/\/+$/, '');
            const creds = { server: baseUrl, username, password };

            if (!saveXtreamCredentials(creds)) {
                showXtreamStatus('❌ فشل حفظ البيانات.', 'error');
                return;
            }

            showXtreamStatus('⏳ جاري جلب القنوات...', '');
            closeXtreamModal();

            try {
                const channels = await fetchXtreamChannels(creds);
                if (channels && channels.length > 0) {
                    allChannels = channels;
                    saveChannelsToStorage(allChannels);
                    buildSidebar();
                    applyFilters();
                    showXtreamStatus(`✅ تم جلب ${allChannels.length} قناة بنجاح.`, 'success');
                } else {
                    showXtreamStatus('⚠️ لم يتم العثور على قنوات. تأكد من بيانات الدخول.', 'error');
                }
            } catch (err) {
                showXtreamStatus(`❌ خطأ: ${err.message}`, 'error');
            }
        }

        function clearXtreamSettings() {
            if (!confirm('هل أنت متأكد من إلغاء ربط حساب Xtream؟ سيتم حذف جميع القنوات المستوردة.')) return;
            localStorage.removeItem(XTREAM_KEY);
            xtreamCredentials = null;
            isXtreamMode = false;
            document.getElementById('xtreamBtn').classList.remove('active');
            document.getElementById('xtreamBtn').innerHTML = '<i class="fas fa-key"></i> Xtream';
            if (DEFAULT_CHANNELS.length > 0) {
                allChannels = JSON.parse(JSON.stringify(DEFAULT_CHANNELS));
            } else {
                allChannels = [];
            }
            saveChannelsToStorage(allChannels);
            buildSidebar();
            applyFilters();
            showXtreamStatus('تم إلغاء الربط.', '');
        }

        function showXtreamStatus(msg, type) {
            const el = document.getElementById('xtreamStatus');
            el.textContent = msg;
            el.className = 'xtream-status ' + (type || '');
        }

        async function fetchXtreamChannels(creds) {
            const { server, username, password } = creds;
            const url = `${server}/player_api.php?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&action=get_live_streams`;
            const proxy = 'https://corsproxy.io/?';
            const finalUrl = proxy + encodeURIComponent(url);

            const response = await fetch(finalUrl);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            const data = await response.json();

            if (!Array.isArray(data)) {
                throw new Error('البيانات المستلمة ليست مصفوفة قنوات.');
            }

            return data.map(item => ({
                id: item.stream_id, // للمفضلة
                name: item.name || 'بدون اسم',
                category: item.category_name || 'عام',
                stream_id: item.stream_id,
                icon: item.stream_icon || '',
                url: ''
            }));
        }

        // ================================================================
        // 9.  تصدير / استيراد (للمدير)
        // ================================================================

        function exportChannels() {
            // ... (نفس الكود القديم)
        }

        function closeExportModal() { /* ... */ }

        function copyExportCode() { /* ... */ }

        function importChannels() { /* ... */ }

        function closeImportModal() { /* ... */ }

        function doImport() { /* ... */ }

        // ================================================================
        // 10.  التهيئة
        // ================================================================

        function initApp() {
            if (appInitialized) return;
            appInitialized = true;

            // تحميل بيانات Xtream
            loadXtreamCredentials();

            // تحميل المفضلة
            loadFavorites();

            // تحميل القنوات (من localStorage أو DEFAULT)
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        allChannels = parsed;
                        buildSidebar();
                        applyFilters();
                        return;
                    }
                } catch (e) {}
            }

            if (DEFAULT_CHANNELS && DEFAULT_CHANNELS.length > 0) {
                allChannels = JSON.parse(JSON.stringify(DEFAULT_CHANNELS));
                saveChannelsToStorage(allChannels);
            } else {
                allChannels = [];
            }
            buildSidebar();
            applyFilters();
        }

        // ================================================================
        // 11.  بدء التطبيق
        // ================================================================

        document.addEventListener('DOMContentLoaded', initApp);
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initApp();
        }
    </script>
</body>
</html>
